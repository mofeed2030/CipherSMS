name: Android CI
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK
        run: |
          cd CipherSMS
          # استخدام المحرك الذي ثبتناه بنجاح في الخطوة السابقة
          curl -L https://services.gradle.org/distributions/gradle-8.5-all.zip -o gradle-8.5-all.zip
          mkdir -p gradle/wrapper
          unzip -j gradle-8.5-all.zip "*/gradle-wrapper.jar" -d gradle/wrapper/
          echo "distributionUrl=https\://services.gradle.org/distributions/gradle-8.5-all.zip" > gradle/wrapper/gradle-wrapper.properties
          chmod +x gradlew

          # تنظيف الصور
          find . -name "*.xml" -type f -exec sed -i 's/android:cx="[^"]*"//g' {} +
          find . -name "*.xml" -type f -exec sed -i 's/android:cy="[^"]*"//g' {} +
          find . -name "*.xml" -type f -exec sed -i 's/android:r="[^"]*"//g' {} +

          # أمر البناء مع فرض السماح للميزات التجريبية (حل الخطأ الأخير)
          ./gradlew assembleDebug --no-daemon             -Pkotlin.compiler.options.allWarningsAsErrors=false             -Dkotlin.optIn=androidx.compose.foundation.ExperimentalFoundationApi             -Dkotlin.optIn=androidx.compose.material3.ExperimentalMaterial3Api
            
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CipherSMS-APK
          path: "**/build/outputs/apk/debug/*.apk"
