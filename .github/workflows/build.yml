name: Android CI
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK
        run: |
          # الدخول للمجلد
          cd CipherSMS
          
          # حذف أي ملفات قديمة للمحرك قد تكون "تالفة"
          rm -f gradlew gradlew.bat
          rm -rf gradle/wrapper
          
          # أمر سحري: يطلب من Gradle تنصيب محرك جديد وسليم تماماً
          gradle wrapper --gradle-version 8.5
          
          # إعطاء صلاحية التشغيل
          chmod +x gradlew
          
          # تنظيف الصور
          find . -name "*.xml" -type f -exec sed -i 's/android:cx="[^"]*"//g' {} +
          find . -name "*.xml" -type f -exec sed -i 's/android:cy="[^"]*"//g' {} +
          find . -name "*.xml" -type f -exec sed -i 's/android:r="[^"]*"//g' {} +
          
          # البناء النهائي
          ./gradlew assembleDebug --no-daemon             -Pkotlin.optIn=androidx.compose.foundation.ExperimentalFoundationApi
            
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CipherSMS-APK
          path: "**/build/outputs/apk/debug/*.apk"
