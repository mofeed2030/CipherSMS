name: Android CI
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.5
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: 8.5

      - name: Build APK
        run: |
          cd CipherSMS
          # تنظيف الصور
          find . -name "*.xml" -type f -exec sed -i 's/android:cx="[^"]*"//g' {} +
          find . -name "*.xml" -type f -exec sed -i 's/android:cy="[^"]*"//g' {} +
          find . -name "*.xml" -type f -exec sed -i 's/android:r="[^"]*"//g' {} +
          
          # الأمر السحري: إجبار المترجم على قبول الميزات التجريبية في كل المشروع
          export GRADLE_OPTS="-Dorg.gradle.project.kotlin.options.freeCompilerArgs=-opt-in=androidx.compose.foundation.ExperimentalFoundationApi"
          
          gradle assembleDebug --no-daemon             -Pandroid.builder.sdkDownload=true             -Pkotlin.allwarningsaserrors=false
