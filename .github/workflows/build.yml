name: Android CI
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.7
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.7

      - name: Smart Fix and Build
        run: |
          FILE="app/src/main/java/com/ciphersms/app/presentation/ui/chat/ChatScreen.kt"
          
          # تنظيف أي محاولات سابقة وتصحيح الكود باستخدام بايثون لضمان الدقة
          python3 -c "
          import os
          path = '$FILE'
          with open(path, 'r') as f:
              lines = f.readlines()
          
          # حذف أي أسطر استيراد مكررة أو خاطئة في البداية
          lines = [l for l in lines if 'import androidx.compose.foundation.ExperimentalFoundationApi' not in l]
          
          # إضافة الاستيراد بعد سطر الـ package مباشرة
          for i, line in enumerate(lines):
              if line.startswith('package '):
                  lines.insert(i + 1, 'import androidx.compose.foundation.ExperimentalFoundationApi\n')
                  break
          
          # إضافة الـ OptIn فوق الـ MessageBubble مباشرة
          new_lines = []
          for line in lines:
              if 'private fun MessageBubble' in line and '@OptIn' not in new_lines[-1]:
                  new_lines.append('    @OptIn(ExperimentalFoundationApi::class)\n')
              new_lines.append(line.replace('@optIn', '@OptIn'))
          
          with open(path, 'w') as f:
              f.writelines(new_lines)
          "
          
          # إصلاح الأيقونات (الذي نجح سابقاً)
          sed -i 's/android:cx/android:centerX/g' app/src/main/res/drawable/ic_cipher_logo.xml
          sed -i 's/android:cy/android:centerY/g' app/src/main/res/drawable/ic_cipher_logo.xml
          sed -i 's/android:r/android:gradientRadius/g' app/src/main/res/drawable/ic_cipher_logo.xml
          sed -i 's/android:cx/android:centerX/g' app/src/main/res/drawable/ic_launcher_foreground.xml
          sed -i 's/android:cy/android:centerY/g' app/src/main/res/drawable/ic_launcher_foreground.xml
          sed -i 's/android:r/android:gradientRadius/g' app/src/main/res/drawable/ic_launcher_foreground.xml
          
          # البناء
          chmod +x gradlew || true
          gradle assembleDebug --no-daemon
            
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CipherSMS-APK
          path: "app/build/outputs/apk/debug/*.apk"
