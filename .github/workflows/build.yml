name: Android CI
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK
        run: |
          cd CipherSMS
          
          # 1. تحميل نسخة Gradle الرسمية
          curl -L https://services.gradle.org/distributions/gradle-8.5-bin.zip -o gradle-8.5-bin.zip
          
          # 2. فك الضغط بالكامل (لتجنب خطأ filename not matched)
          unzip -q gradle-8.5-bin.zip
          
          # 3. استخدام النسخة التي حملناها لتوليد الـ wrapper الخاص بمشروعك
          ./gradle-8.5/bin/gradle wrapper --gradle-version 8.5
          
          # 4. تنظيف الصور
          find . -name "*.xml" -type f -exec sed -i 's/android:cx="[^"]*"//g' {} +
          find . -name "*.xml" -type f -exec sed -i 's/android:cy="[^"]*"//g' {} +
          find . -name "*.xml" -type f -exec sed -i 's/android:r="[^"]*"//g' {} +
          
          # 5. إعطاء الصلاحية والبدء بالبناء
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon             -Pkotlin.optIn=androidx.compose.foundation.ExperimentalFoundationApi
            
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CipherSMS-APK
          path: "**/build/outputs/apk/debug/*.apk"
