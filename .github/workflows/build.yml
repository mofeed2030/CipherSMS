name: Android CI
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.5
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: 8.5

      - name: Update SDK & Build Tools
        run: |
          sudo sdkmanager "build-tools;34.0.0" "platforms;android-34"

      - name: Fix Vector Assets
        run: |
          cd CipherSMS
          # تنظيف خصائص الـ XML المؤقت لتجاوز مشاكل الربط
          find . -name "*.xml" -type f -exec sed -i 's/android:cx="[^"]*"//g' {} +
          find . -name "*.xml" -type f -exec sed -i 's/android:cy="[^"]*"//g' {} +
          find . -name "*.xml" -type f -exec sed -i 's/android:r="[^"]*"//g' {} +

      - name: Build APK
        run: |
          cd CipherSMS
          # استخدام Gradle النظيفة وليس wrapper التالف
          gradle assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CipherSMS-APK
          path: CipherSMS/app/build/outputs/apk/debug/*.apk
