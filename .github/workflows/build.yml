name: Android CI
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.5
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: 8.5

      - name: Fix Assets and Build
        run: |
          cd CipherSMS
          # تنظيف الصور (الخطوة الناجحة دائماً)
          find . -name "*.xml" -type f -exec sed -i 's/android:cx="[^"]*"//g' {} +
          find . -name "*.xml" -type f -exec sed -i 's/android:cy="[^"]*"//g' {} +
          find . -name "*.xml" -type f -exec sed -i 's/android:r="[^"]*"//g' {} +
          
          # البناء مع السماح بالميزات التجريبية وتجاهل أخطاء التوافق
          gradle assembleDebug --no-daemon             -Pandroid.builder.sdkDownload=true             -Pkotlin.optIn=androidx.compose.foundation.ExperimentalFoundationApi
