name: Android CI
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Force Gradle 8.0
        run: |
          cd CipherSMS
          # حذف أي إعدادات قديمة للـ Wrapper
          rm -rf gradle/wrapper/gradle-wrapper.properties
          # إجبار النظام على استخدام نسخة 8.0 المتوافقة
          gradle wrapper --gradle-version 8.0 --distribution-type bin
          chmod +x gradlew

      - name: Build APK
        run: |
          cd CipherSMS
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CipherSMS-APK
          path: CipherSMS/app/build/outputs/apk/debug/*.apk
