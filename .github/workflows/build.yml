name: Android CI
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.7
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.7

      - name: Precise Fix and Build
        run: |
          FILE="app/src/main/java/com/ciphersms/app/presentation/ui/chat/ChatScreen.kt"
          
          # أولاً: تنظيف أي محاولات فاشلة سابقة لسطر الاستيراد
          sed -i '/import androidx.compose.foundation.ExperimentalFoundationApi/d' $FILE
          
          # ثانياً: إضافة الاستيراد في السطر الثاني (بعد الـ package مباشرة) بطريقة صحيحة
          sed -i '1a import androidx.compose.foundation.ExperimentalFoundationApi' $FILE
          
          # ثالثاً: تصحيح الـ OptIn لتكون بالحرف الكبير وإضافة المسار الكامل للضمان
          sed -i 's/@optIn/@OptIn/g' $FILE
          sed -i 's/ExperimentalFoundationApi::class/androidx.compose.foundation.ExperimentalFoundationApi::class/g' $FILE
          
          # رابعاً: إصلاح الأيقونات (الترجمة التي نجحت سابقاً)
          sed -i 's/android:cx/android:centerX/g' app/src/main/res/drawable/ic_cipher_logo.xml
          sed -i 's/android:cy/android:centerY/g' app/src/main/res/drawable/ic_cipher_logo.xml
          sed -i 's/android:r/android:gradientRadius/g' app/src/main/res/drawable/ic_cipher_logo.xml
          sed -i 's/android:cx/android:centerX/g' app/src/main/res/drawable/ic_launcher_foreground.xml
          sed -i 's/android:cy/android:centerY/g' app/src/main/res/drawable/ic_launcher_foreground.xml
          sed -i 's/android:r/android:gradientRadius/g' app/src/main/res/drawable/ic_launcher_foreground.xml
          
          # البناء
          chmod +x gradlew || true
          gradle assembleDebug --no-daemon
            
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CipherSMS-APK
          path: "app/build/outputs/apk/debug/*.apk"
