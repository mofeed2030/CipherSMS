name: Android CI
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.5
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: 8.5

      - name: Fix Assets and Build
        run: |
          cd CipherSMS
          # تنظيف الصور
          find . -name "*.xml" -type f -exec sed -i 's/android:cx="[^"]*"//g' {} +
          find . -name "*.xml" -type f -exec sed -i 's/android:cy="[^"]*"//g' {} +
          find . -name "*.xml" -type f -exec sed -i 's/android:r="[^"]*"//g' {} +
          
          # بناء التطبيق الآن بعد تحديث الكود لـ 1.9.20
          gradle assembleDebug --no-daemon -Pandroid.builder.sdkDownload=true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CipherSMS-APK
          path: CipherSMS/app/build/outputs/apk/debug/*.apk
