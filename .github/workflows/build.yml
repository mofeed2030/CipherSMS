name: Android CI
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.5
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: 8.5

      - name: Auto-Fix Code and Build
        run: |
          cd CipherSMS
          # 1. تنظيف الصور
          find . -name "*.xml" -type f -exec sed -i 's/android:cx="[^"]*"//g' {} +
          find . -name "*.xml" -type f -exec sed -i 's/android:cy="[^"]*"//g' {} +
          find . -name "*.xml" -type f -exec sed -i 's/android:r="[^"]*"//g' {} +
          
          # 2. إضافة المكتبة بعد سطر الـ package (المكان الصحيح برمجياً)
          sed -i '/package /a import androidx.compose.foundation.ExperimentalFoundationApi' app/src/main/java/com/ciphersms/app/presentation/ui/chat/ChatScreen.kt
          
          # 3. بناء التطبيق مع تجاهل التحذيرات وقبول الميزات التجريبية
          gradle assembleDebug --no-daemon             -Pandroid.builder.sdkDownload=true             -Pkotlin.allwarningsaserrors=false             -Pkotlin.optIn=androidx.compose.foundation.ExperimentalFoundationApi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CipherSMS-APK
          path: CipherSMS/app/build/outputs/apk/debug/*.apk
