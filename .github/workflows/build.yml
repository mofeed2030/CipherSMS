name: Android CI
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK
        run: |
          # إصلاح كود Kotlin (الحقن التلقائي)
          sed -i '/private fun MessageBubble/i \    @optIn(androidx.compose.foundation.ExperimentalFoundationApi::class)' app/src/main/java/com/ciphersms/app/presentation/ui/chat/ChatScreen.kt
          
          # إجبار السيرفر على توليد واستخدام Gradle 8.7 حصراً
          gradle wrapper --gradle-version 8.7
          chmod +x gradlew
          
          # تشغيل البناء مع تعطيل التحذيرات التي تسبب توقف النسخ الجديدة
          ./gradlew assembleDebug --no-daemon -Pandroid.defaults.buildfeatures.buildconfig=true
            
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CipherSMS-APK
          path: "app/build/outputs/apk/debug/*.apk"
